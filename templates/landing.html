<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>University Carpool Matchmaking</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <form class="admin-login" method="post" action="/admin/login">
        <input name="username" placeholder="Admin username" required />
        <input name="password" type="password" placeholder="Admin password" required />
        <button type="submit">Admin Login</button>
      </form>
    </header>

    <main class="landing">
      <h1>University Carpool Matchmaking</h1>
      <p class="tagline">Find students on the same flight and split airport rides to save money and time.</p>
      <div class="scroll-cta">⬇ Scroll below to start ⬇</div>

      <section class="card actions">
        <h2>What would you like to do today?</h2>
        <div class="button-row">
          <a class="button-link" href="/search">Search for a Carpool</a>
          <a class="button-link" href="/join">Add to Carpool Database</a>
        </div>
      </section>
    </main>
  </body>
</html>
