<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UCR Carpool Matchmaking</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    <script>if(localStorage.getItem('theme')==='light'){document.documentElement.classList.add('light-mode');}</script>
  </head>
  <body>
    <header class="site-header">
      <nav class="nav-links">
        <a href="/" class="active">Home</a>
        <a href="/find-a-carpool">Find a Carpool</a>
        <a href="/create-a-carpool">Create a Carpool</a>
      </nav>
      <form class="admin-login" method="post" action="/admin/login">
        <input name="username" placeholder="Admin username" required />
        <input name="password" type="password" placeholder="Admin password" required />
        <button type="submit">Admin Login</button>
      </form>
    </header>

    <main>
      <section class="hero-screen">
        <p class="badge">WELCOME</p>
        <h1>UCR Carpool Matchmaking</h1>
        <p class="tagline">Connecting students one flight at a time.</p>
        <p style="font-size:0.85rem;color:var(--text-muted);margin-top:0.5rem;">Free 30-day trial for new accounts &mdash; no credit card required.</p>
        <a class="scroll-button" href="#start">Scroll to Start ↓</a>
      </section>

      <section class="card actions" id="start">
        <h2>What would you like to do today?</h2>
        <div class="button-row">
          <a class="button-link" href="/create-a-carpool">Create a Carpool</a>
          <a class="button-link" href="/find-a-carpool">Find Available Carpools</a>
        </div>
      </section>
    </main>
      <script src="{{ url_for('static', filename='theme-global.js') }}"></script>
  </body>
</html>
