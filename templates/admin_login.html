<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Campus2Air</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="site-header">
      <a href="/" class="site-logo">Campus2Air</a>
      <nav class="nav-links">
        <a href="/">Home</a>
      </nav>
      <div class="hamburger-wrap">
        <button class="hamburger-btn" id="hamburger-btn" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
        <div class="hamburger-menu" id="hamburger-menu">
          <a href="/eula">EULA & ToS</a>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="admin-login-page">
        <div class="admin-login-card card">
          <h2>Admin Login</h2>
          <p class="card-subtitle">Enter your credentials to access the admin panel.</p>

          {% if admin_error %}
          <p class="error-banner">Incorrect username or password. Please try again.</p>
          {% endif %}

          <form method="post" action="/admin/login" class="admin-login-form">
            <label>Username
              <input name="username" placeholder="Username" required autocomplete="username" />
            </label>
            <label>Password
              <input name="password" type="password" placeholder="Password" required autocomplete="current-password" />
            </label>
            <button type="submit" class="btn btn-primary btn-block mt-2">Sign In</button>
          </form>

          <p class="text-center text-muted text-sm mt-2">
            <a href="/" style="color: var(--accent2); text-decoration: none;">Back to Home</a>
          </p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Campus2Air &mdash; Built for students, by students.</p>
    </footer>
    <script>
      const hbBtn = document.getElementById('hamburger-btn');
      const hbMenu = document.getElementById('hamburger-menu');
      hbBtn?.addEventListener('click', () => hbMenu.classList.toggle('open'));
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.hamburger-wrap')) hbMenu.classList.remove('open');
      });
    </script>
  </body>
</html>
