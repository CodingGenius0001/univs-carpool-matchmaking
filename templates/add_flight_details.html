<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Flight Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/find-a-carpool">Find a Carpool</a>
        <a href="/add-flight-details" class="active">Add Flight Details</a>
      </nav>
    </header>

    <main class="container">
      <section class="card">
        <h2>Add Yourself to the Carpool Database</h2>
        <p class="disclaimer">Privacy disclaimer: no information is sold, and records are automatically removed after the flight lands.</p>
        <form id="join-form">
          <div class="grid">
            <label>First Name <input name="first_name" required /></label>
            <label>Last Initial <input name="last_initial" maxlength="1" required /></label>
            <label>Phone Number <input name="phone" required /></label>
            <label>Flight Code <input name="flight_code" placeholder="UA 2363" required /></label>
            <label>Airport Code (3 letters) <input name="airport_code" maxlength="3" placeholder="SFO" required /></label>
            <label>Seats Available <input type="number" name="seats_available" value="3" min="1" max="7" /></label>
          </div>
          <label>Notes <textarea name="notes" rows="3" placeholder="Pickup details"></textarea></label>
          <button type="submit">Save to Database</button>
        </form>
        <p id="join-message"></p>
      </section>
    </main>
    <script src="{{ url_for('static', filename='join.js') }}"></script>
  </body>
</html>
