<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Flight Details - UniRide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="site-header">
      <a href="/" class="site-logo">UniRide</a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/find-a-carpool">Find a Carpool</a>
        <a href="/add-flight-details" class="active">Add Flight</a>
      </nav>
    </header>

    <main class="container">
      <section class="card">
        <h2>Add Your Flight Details</h2>
        <p class="disclaimer">Your info is only visible to matched carpool partners. Records are automatically removed after the flight lands.</p>

        <form id="join-form">
          <div class="grid">
            <label>First Name
              <input name="first_name" required placeholder="e.g. Alex" />
            </label>
            <label>Last Initial
              <input name="last_initial" maxlength="1" required placeholder="e.g. K" />
            </label>
            <label>Phone Number
              <input name="phone" id="phone" required placeholder="+1 (909) 555 1234" maxlength="17" />
            </label>
            <label class="autocomplete-wrap">Flight Code
              <input name="flight_code" id="flight_code" placeholder="e.g. UA1375" required autocomplete="off" />
              <div id="airline-dropdown" class="airline-dropdown"></div>
            </label>
            <label>Airline
              <input id="airline_name" placeholder="Auto-detected from flight code" readonly tabindex="-1" class="airline-readonly" />
            </label>
            <label>Date of Departure
              <input type="text" name="departure_date" id="departure_date" required placeholder="MM-DD-YYYY" maxlength="10" />
            </label>
            <label>Departure Airport
              <input name="airport_code" id="airport_code" maxlength="3" placeholder="e.g. SFO" required />
            </label>
            <label>Destination Airport
              <input name="destination_airport" id="destination_airport" maxlength="3" placeholder="e.g. JFK" />
            </label>
            <label>Planned Departure Time (from campus)
              <input type="time" name="planned_departure_time" id="planned_departure_time" />
            </label>
            <label>Seats Available
              <input type="number" name="seats_available" value="3" min="1" max="7" />
            </label>
          </div>

          <div id="suggestions-section" class="flight-suggestions" style="display: none;">
            <label>Flight Suggestions
              <small>Click a flight to auto-fill your form</small>
            </label>
            <div id="suggestion-list" class="suggestion-list"></div>
          </div>

          <label class="mt-2">Notes
            <textarea name="notes" rows="3" placeholder="Pickup location preference, luggage info, etc."></textarea>
          </label>

          <button type="submit" class="btn btn-primary btn-block mt-2">Save to Database</button>
        </form>
        <p id="join-message"></p>
      </section>
    </main>

    <footer class="site-footer">
      <p>UniRide &mdash; Built for students, by students.</p>
    </footer>

    <script src="{{ url_for('static', filename='join.js') }}"></script>
  </body>
</html>
