<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find a Carpool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/find-a-carpool">Find a Carpool</a>
        <a href="/add-flight-details">Add Flight Details</a>
      </nav>
    </header>

    <main class="container">
      <section class="card">
        <h2>Find Available Carpools</h2>
        <form id="search-form">
          <div class="grid">
            <label>Flight Code <input name="flight_code" placeholder="UA 2363" /></label>
            <label>Airport Code (3 letters) <input name="airport_code" maxlength="3" placeholder="SFO" /></label>
          </div>
          <button type="submit">Search Carpools</button>
        </form>
        <div id="results"></div>
      </section>
    </main>
    <script src="{{ url_for('static', filename='search.js') }}"></script>
  </body>
</html>
