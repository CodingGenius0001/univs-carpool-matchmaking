<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find a Carpool - UniRide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="site-header">
      <a href="/" class="site-logo">UniRide</a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/find-a-carpool" class="active">Find a Carpool</a>
        <a href="/add-flight-details">Add Flight</a>
      </nav>
    </header>

    <main class="container">
      <section class="card">
        <h2>Find Available Carpools</h2>
        <p class="card-subtitle">Search by flight code, airport, or date. Leave fields empty to see all available carpools.</p>

        <form id="search-form">
          <div class="grid">
            <label>Flight Code
              <input name="flight_code" placeholder="e.g. UA1375" />
            </label>
            <label>Airport Code
              <input name="airport_code" maxlength="3" placeholder="e.g. SFO" />
            </label>
            <label>Date of Departure
              <input type="text" name="departure_date" placeholder="MM-DD-YYYY" maxlength="10" />
            </label>
          </div>
          <button type="submit" class="btn btn-primary btn-block mt-2">Search Carpools</button>
        </form>

        <div id="results" class="results-container"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>UniRide &mdash; Built for students, by students.</p>
    </footer>

    <script src="{{ url_for('static', filename='search.js') }}"></script>
  </body>
</html>
