<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EULA & Terms of Service - UniRide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="site-header">
      <a href="/" class="site-logo">UniRide</a>
      <nav class="nav-links">
        <a href="/">Home</a>
      </nav>
      <div class="hamburger-wrap">
        <button class="hamburger-btn" id="hamburger-btn" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
        <div class="hamburger-menu" id="hamburger-menu">
          <a href="/eula" class="active">EULA & ToS</a>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="card">
        <h2>EULA & Terms of Service</h2>
        <p class="card-subtitle">Please review our End User License Agreement and Terms of Service below.</p>

        <div class="pdf-viewer">
          <object
            data="{{ url_for('serve_docs', filename='campus2air-tos.pdf') }}"
            type="application/pdf"
            width="100%"
            height="100%"
          >
            <p style="padding:2rem;text-align:center;color:var(--text-muted);">
              Your browser cannot display the PDF inline.
              <a href="{{ url_for('serve_docs', filename='campus2air-tos.pdf') }}" target="_blank" style="color:var(--accent);">
                Click here to open the document.
              </a>
            </p>
          </object>
        </div>

        <div class="mt-2 text-center">
          <a
            href="{{ url_for('serve_docs', filename='campus2air-tos.pdf') }}"
            target="_blank"
            class="btn btn-secondary btn-sm"
          >
            Open PDF in New Tab
          </a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>UniRide &mdash; Built for students, by students.</p>
    </footer>

    <script>
      const btn = document.getElementById('hamburger-btn');
      const menu = document.getElementById('hamburger-menu');
      btn?.addEventListener('click', () => menu.classList.toggle('open'));
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.hamburger-wrap')) menu.classList.remove('open');
      });
    </script>
  </body>
</html>
